version: '3.8'

services:
  eureka-server:
    build:
      context: ../eureka-server
      dockerfile: Dockerfile # Kendi imaj adınla değiştir
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - reckon-arc

  reckon-gateway:
    build: .
    container_name: reckon-gateway
    ports:
      - "8084:8084"
    networks:
      - reckon-arc
    depends_on:
      - eureka-server

  user-authentication-service:
    build:
      context: ../UserAuthenticationService
      dockerfile: Dockerfile
    container_name: UserAuthenticationService
    networks:
      - reckon-arc
    depends_on:
      - eureka-server

  cold-wallet-manager-service:
    build:
      context: ../ColdWalletManager
      dockerfile: Dockerfile
    container_name: Cold-Wallet-Manager-Service
    networks:
      - reckon-arc
    depends_on:
      - eureka-server

networks:
  reckon-arc:
    driver: bridge
